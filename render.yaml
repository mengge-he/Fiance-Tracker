services:
  - type: web
    runtime: docker
    name: finance-tracker-api
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: finance-tracker-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: finance-tracker-db
          property: password
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://*.onrender.com,http://localhost:*,http://127.0.0.1:*

databases:
  - name: finance-tracker-db
    plan: free
    databaseName: finance_tracker
    user: finance_user
    postgresMajorVersion: "16"
